<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GS1 Scanner</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Dynamsoft Barcode Reader Bundle (WASM 引擎，GS1-128 識別率遠優於 ZXing.js) -->
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-barcode-reader-bundle@11.2.4000/dist/dbr.bundle.js"></script>

<style>
:root {
  --g:#06C755; --bk:#080808; --sf:#111; --sf2:#1a1a1a;
  --bd:rgba(255,255,255,.08); --tx:#F0F0F0; --mu:#666;
  --rd:#FF4D4D; --yw:#FFD600; --bl:#4DA6FF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bk);color:var(--tx);font-family:'Syne',sans-serif;overflow:hidden}
.page{position:fixed;inset:0;display:none;flex-direction:column}
.page.active{display:flex}

/* ── Auth ── */
#page-auth{align-items:center;justify-content:center;padding:40px 32px 70px;overflow-y:auto}
.logo{width:52px;height:52px;background:var(--g);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:22px}
h1{font-size:24px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
.sub{color:var(--mu);font-size:13px;margin-bottom:28px;text-align:center;line-height:1.5}
.btn{width:100%;padding:14px 20px;border-radius:12px;border:none;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97);opacity:.85}
.bp{background:var(--g);color:#000}
.bs{background:var(--sf2);color:var(--tx)}
.bo{background:transparent;border:1px solid var(--bd);color:var(--mu)}
.div{display:flex;align-items:center;gap:12px;width:100%;max-width:320px;margin:18px 0;color:var(--mu);font-size:12px}
.div::before,.div::after{content:'';flex:1;height:1px;background:var(--bd)}
.iw{width:100%;max-width:320px;margin-bottom:10px}
input.fi{width:100%;background:var(--sf2);border:1px solid var(--bd);padding:12px 14px;border-radius:10px;color:var(--tx);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s}
input.fi::placeholder{color:var(--mu)}
input.fi:focus{border-color:rgba(6,199,85,.5)}
.ver{position:absolute;bottom:48px;font-family:'DM Mono',monospace;font-size:10px;color:#222}

/* ── Scanner ── */
#page-scanner{background:#000}
#cam{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
/* Dynamsoft 會把自己的 UI 注入到 #dce-container */
#dce-container{position:absolute;inset:0;z-index:2}
.scan-ui{position:absolute;inset:0;display:flex;flex-direction:column;pointer-events:none;z-index:3}
.sh{padding:52px 20px 16px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);pointer-events:all;display:flex;justify-content:space-between;align-items:center}
.bk-btn{background:rgba(255,255,255,.1);border:none;border-radius:10px;color:#fff;padding:8px 14px;font-family:'Syne',sans-serif;font-size:13px;cursor:pointer}
.bk-btn:active{background:rgba(255,255,255,.2)}
#udp{font-size:12px;color:rgba(255,255,255,.6);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid;transition:all .3s}
.b-ok{color:var(--g);border-color:rgba(6,199,85,.4);background:rgba(6,199,85,.1)}
.b-ld{color:#888;border-color:#333;background:transparent}
.b-er{color:var(--rd);border-color:rgba(255,77,77,.4);background:rgba(255,77,77,.1)}
.sf-footer{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 56px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);pointer-events:all;display:flex;flex-direction:column;gap:8px;z-index:3}

/* ── Sheet ── */
.sheet{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:none;align-items:flex-end;z-index:100}
.sheet.open{display:flex;animation:fi .2s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
.si{width:100%;background:var(--sf);border-radius:24px 24px 0 0;padding:28px 24px 48px;max-height:85vh;overflow-y:auto;animation:su .28s cubic-bezier(.32,.72,0,1)}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.hdl{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 22px}
.st{font-size:18px;font-weight:700;margin-bottom:18px;letter-spacing:-.3px}
.rc{background:var(--sf2);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:10px}
.rr{display:flex;flex-direction:column;padding:13px 16px;border-bottom:1px solid var(--bd)}
.rr:last-child{border-bottom:none}
.rl{font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.rv{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--g);word-break:break-all;line-height:1.4}
.rv.miss{color:var(--mu);font-size:13px;font-style:italic}
.rb{font-family:'DM Mono',monospace;font-size:10px;color:#444;word-break:break-all;margin:10px 0;padding:10px 12px;background:#0d0d0d;border-radius:8px;line-height:1.7}
.sba{display:flex;flex-direction:column;gap:8px;margin-top:18px}

/* ── Toast ── */
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:#1e1e1e;border:1px solid var(--bd);color:var(--tx);font-size:12px;padding:9px 16px;border-radius:20px;z-index:300;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;font-family:'DM Mono',monospace}
.toast.show{opacity:1}

/* ── Console ── */
#con{position:fixed;bottom:0;left:0;right:0;height:38px;background:#080808;border-top:1px solid #1a1a1a;z-index:500;display:flex;flex-direction:column;transition:height .25s ease;font-family:'DM Mono',monospace}
#con.open{height:260px}
#ch{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:38px;min-height:38px;cursor:pointer;user-select:none;flex-shrink:0}
#ct{font-size:11px;color:#444;display:flex;align-items:center;gap:8px}
#cc{background:#141414;border:1px solid #222;color:#555;font-size:10px;padding:1px 7px;border-radius:10px;min-width:20px;text-align:center}
#cc.e{background:rgba(255,77,77,.12);border-color:rgba(255,77,77,.25);color:var(--rd)}
#ccl{background:none;border:none;color:#333;font-size:10px;cursor:pointer;padding:4px 8px;font-family:'DM Mono',monospace}
#ccl:hover{color:#777}
#cl{flex:1;overflow-y:auto;padding:4px 12px 6px;display:flex;flex-direction:column;gap:1px}
.ll{font-size:11px;line-height:1.5;display:flex;gap:8px;padding:2px 0;border-bottom:1px solid #0d0d0d}
.lt{color:#222;flex-shrink:0;font-size:10px;padding-top:1px;min-width:84px}
.lm{word-break:break-all;flex:1}
.llog .lm{color:#777} .linfo .lm{color:var(--bl)} .lwarn .lm{color:var(--yw)} .lerror .lm{color:var(--rd)} .lok .lm{color:var(--g)}
</style>
</head>
<body>

<!-- Auth -->
<div class="page active" id="page-auth">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
      <rect x="3" y="3" width="4" height="22" rx="1" fill="#000"/>
      <rect x="9" y="3" width="2" height="22" rx="1" fill="#000"/>
      <rect x="13" y="3" width="4" height="22" rx="1" fill="#000"/>
      <rect x="19" y="3" width="2" height="22" rx="1" fill="#000"/>
      <rect x="23" y="3" width="2" height="22" rx="1" fill="#000"/>
    </svg>
  </div>
  <h1>GS1 Scanner</h1>
  <p class="sub">GS1-128 / DataMatrix / QR<br>WASM 引擎高精度解碼</p>
  <button class="btn bp" style="max-width:320px" onclick="initLiff()">以 LINE 登入</button>
  <div class="div">或手動輸入</div>
  <div class="iw">
    <input class="fi" id="mi" placeholder="(01)04711...(17)...(10)...">
  </div>
  <div style="width:100%;max-width:320px">
    <button class="btn bo" onclick="handleManual()">解析並預覽</button>
  </div>
  <div class="ver">v4.0.0 · Dynamsoft WASM · debug</div>
</div>

<!-- Scanner -->
<div class="page" id="page-scanner">
  <video id="cam" playsinline muted autoplay></video>
  <!-- Dynamsoft CameraEnhancer 會注入到這裡 -->
  <div id="dce-container"></div>
  <div class="scan-ui">
    <div class="sh">
      <button class="bk-btn" onclick="backHome()">← 返回</button>
      <div id="udp"></div>
      <div class="badge b-ld" id="sbadge">初始化中</div>
    </div>
  </div>
  <div class="sf-footer">
    <button class="btn bp" id="sbtn" onclick="startScan()">啟動掃描鏡頭</button>
    <button class="btn bs" id="stopbtn" style="display:none" onclick="stopScan()">停止掃描</button>
  </div>
</div>

<!-- Result Sheet -->
<div class="sheet" id="rs">
  <div class="si">
    <div class="hdl"></div>
    <div class="st">掃描結果</div>
    <div class="rc" id="rl"></div>
    <div class="rb" id="rb"></div>
    <div class="sba">
      <button class="btn bp" onclick="sendLine()">傳送至 LINE 聊天室</button>
      <button class="btn bs" onclick="closeSheet()">繼續掃描</button>
    </div>
  </div>
</div>

<div class="toast" id="tst"></div>

<!-- Console Panel -->
<div id="con">
  <div id="ch" onclick="toggleCon()">
    <div id="ct">▶ console <span id="cc">0</span></div>
    <button id="ccl" onclick="event.stopPropagation();clearCon()">清除</button>
  </div>
  <div id="cl"></div>
</div>

<script>
/* ════ Console ════ */
let _lc=0,_ec=0,_co=false;
function toggleCon(){
  _co=!_co;
  document.getElementById('con').classList.toggle('open',_co);
  const t=document.getElementById('ct');
  t.textContent=(_co?'▼':'▶')+' console ';
  t.appendChild(document.getElementById('cc'));
  if(_co){const l=document.getElementById('cl');l.scrollTop=l.scrollHeight;}
}
function clearCon(){document.getElementById('cl').innerHTML='';_lc=0;_ec=0;_uc();}
function _uc(){const e=document.getElementById('cc');e.textContent=_lc;e.className=_ec>0?'e':'';}
function _ap(type,args){
  const msg=args.map(a=>{
    if(a==null)return String(a);
    if(typeof a==='object'){try{return JSON.stringify(a,null,0);}catch(e){return String(a);}}
    return String(a);
  }).join(' ');
  const n=new Date(),ts=n.toTimeString().slice(0,8)+'.'+String(n.getMilliseconds()).padStart(3,'0');
  const d=document.createElement('div');
  d.className='ll l'+type;
  d.innerHTML='<span class="lt">'+ts+'</span><span class="lm">'+_es(msg)+'</span>';
  const l=document.getElementById('cl');
  l.appendChild(d);_lc++;
  if(type==='error'||type==='warn')_ec++;
  _uc();
  if(_co)l.scrollTop=l.scrollHeight;
}
function _es(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const _ol=console.log.bind(console),_oi=console.info.bind(console),
      _ow=console.warn.bind(console),_oe=console.error.bind(console);
console.log=(...a)=>{_ol(...a);_ap('log',a);};
console.info=(...a)=>{_oi(...a);_ap('info',a);};
console.warn=(...a)=>{_ow(...a);_ap('warn',a);};
console.error=(...a)=>{_oe(...a);_ap('error',a);};
function clog(m){_ap('ok',[m]);_ol('[✓]',m);}
function cerr(m){_ap('error',[m]);_oe('[✗]',m);}
function cwarn(m){_ap('warn',[m]);_ow('[!]',m);}
window.addEventListener('error',e=>cerr('UNCAUGHT: '+e.message+' @'+e.filename+':'+e.lineno));
window.addEventListener('unhandledrejection',e=>cerr('PROMISE REJ: '+(e.reason?.message||e.reason)));

/* ════ State ════ */
const LIFF_ID='2009550177-uiMwrJEn';
// 公開測試用 license（正式使用請到 dynamsoft.com 申請自己的 30天 free trial）
const DST_LICENSE='DLS2eyJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSJ9';
let curData=null, cvRouter=null, camEnhancer=null, scanning=false;

/* ════ Toast ════ */
function toast(msg,ms=2500){
  const e=document.getElementById('tst');
  e.textContent=msg;e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),ms);
}
function setSt(t,txt){
  const e=document.getElementById('sbadge');
  e.className='badge b-'+t;e.textContent=txt;
}

/* ════ LIFF ════ */
async function initLiff(){
  clog('initLiff()');
  try{
    await liff.init({liffId:LIFF_ID});
    clog('liff.init OK  isLoggedIn='+liff.isLoggedIn());
    if(!liff.isLoggedIn()){clog('→ liff.login()');liff.login();}
    else await enterScanner();
  }catch(e){cerr('liff.init: '+e.message);toast('LIFF 失敗: '+e.message);}
}
async function enterScanner(){
  try{
    const p=await liff.getProfile();
    document.getElementById('udp').textContent=p.displayName;
    clog('Profile: '+p.displayName);
  }catch(e){cwarn('getProfile: '+e.message);}
  document.getElementById('page-auth').classList.remove('active');
  document.getElementById('page-scanner').classList.add('active');
  clog('→ scanner page');
}

/* ════ Dynamsoft Init ════ */
async function initDynamsoft(){
  clog('initDynamsoft() — license init...');
  try{
    Dynamsoft.License.LicenseManager.initLicense(DST_LICENSE);
    clog('LicenseManager.initLicense OK');
  }catch(e){cerr('LicenseManager err: '+e.message);}

  clog('Loading WASM resources...');
  try{
    await Dynamsoft.Core.CoreModule.loadWasm(['dbr']);
    clog('WASM loaded ✓');
  }catch(e){
    cerr('loadWasm FAILED: '+e.message);
    setSt('er','WASM 載入失敗');
    toast('WASM 載入失敗，請確認網路');
    return false;
  }
  return true;
}

/* ════ Start / Stop Scan ════ */
async function startScan(){
  setSt('ld','初始化...');
  clog('startScan()');
  document.getElementById('sbtn').style.display='none';

  const ok=await initDynamsoft();
  if(!ok){document.getElementById('sbtn').style.display='block';return;}

  try{
    // CaptureVisionRouter
    cvRouter=await Dynamsoft.CVR.CaptureVisionRouter.createInstance();
    clog('CaptureVisionRouter created');

    // CameraView + CameraEnhancer
    const cameraView=await Dynamsoft.DCE.CameraView.createInstance();
    camEnhancer=await Dynamsoft.DCE.CameraEnhancer.createInstance(cameraView);

    // 把 Dynamsoft UI 掛到容器
    document.getElementById('dce-container').appendChild(cameraView.getUIElement());
    clog('CameraView UI mounted');

    // 連接 camera → router
    cvRouter.setInput(camEnhancer);

    // 結果回調
    cvRouter.addResultReceiver({
      onDecodedBarcodesReceived:(result)=>{
        if(!scanning) return;
        const items=result.barcodeResultItems;
        if(!items||!items.length) return;
        const item=items[0];
        const raw=item.text;
        const fmt=item.formatString||'';
        clog('DECODED ['+fmt+']: '+raw);
        if(navigator.vibrate) navigator.vibrate(80);
        handleDetection(raw, item);
      }
    });

    // 指定只掃 Code128 + DataMatrix + QR，提升速度
    const settings=await cvRouter.getSimplifiedSettings('ReadBarcodes_Default');
    settings.barcodeSettings.barcodeFormatIds=
      Dynamsoft.DBR.EnumBarcodeFormat.BF_CODE_128 |
      Dynamsoft.DBR.EnumBarcodeFormat.BF_DATA_MATRIX |
      Dynamsoft.DBR.EnumBarcodeFormat.BF_QR_CODE;
    await cvRouter.updateSettings('ReadBarcodes_Default', settings);
    clog('Format filter applied: CODE_128 | DATA_MATRIX | QR_CODE');

    // 啟動 camera
    await camEnhancer.open(true);
    clog('Camera opened ✓');

    // 開始掃描
    await cvRouter.startCapturing('ReadBarcodes_Default');
    scanning=true;
    setSt('ok','對準 GS1 條碼');
    document.getElementById('stopbtn').style.display='block';
    clog('Capturing started ✓');

  }catch(e){
    cerr('startScan ERR: '+e.name+' — '+e.message);
    setSt('er','啟動失敗');
    toast('掃描啟動失敗: '+e.message);
    document.getElementById('sbtn').style.display='block';
  }
}

async function stopScan(){
  clog('stopScan()');
  scanning=false;
  try{if(cvRouter)  {await cvRouter.stopCapturing();  clog('cvRouter stopped');}}catch(e){cwarn(e.message);}
  try{if(camEnhancer){await camEnhancer.close();       clog('camEnhancer closed');}}catch(e){cwarn(e.message);}
  cvRouter=null; camEnhancer=null;
  document.getElementById('dce-container').innerHTML='';
  setSt('ld','已停止');
  document.getElementById('sbtn').style.display='block';
  document.getElementById('stopbtn').style.display='none';
}

function backHome(){
  clog('backHome()');
  stopScan();
  document.getElementById('page-scanner').classList.remove('active');
  document.getElementById('page-auth').classList.add('active');
}

/* ════ Detection ════ */
function handleDetection(raw, item){
  if(!scanning) return;
  scanning=false; // 暫停，避免重複觸發

  // 嘗試取 Dynamsoft 自動解析的 GS1 AIs
  let parsed={gtin:null,batch:null,expiry:null};

  // Dynamsoft 在 item.details 或 item.parsedText 放解析結果（視版本而定）
  // 優先嘗試 item.details（AI 列表）
  if(item?.details){
    clog('item.details: '+JSON.stringify(item.details));
    const ais=item.details;
    if(ais['01']) parsed.gtin=ais['01'];
    if(ais['02']) parsed.gtin=ais['02'];
    if(ais['17']) parsed.expiry=fmtD(ais['17']);
    if(ais['10']) parsed.batch=ais['10'];
  }

  // fallback：自己解析
  if(!parsed.gtin && !parsed.batch && !parsed.expiry){
    clog('details 無資料，fallback 自行解析');
    parsed=parseGS1(raw);
  } else {
    clog('使用 Dynamsoft AI 解析結果');
  }

  curData=parsed;
  renderSheet(raw);
}

/* ════ GS1 Fallback Parser ════ */
function parseGS1(raw){
  const d={gtin:null,batch:null,expiry:null};
  let s=raw.trim().replace(/^\](C1|d2|e0|Q3)/,'');
  clog('fallback parse: '+JSON.stringify(s.slice(0,80)));
  if(s.includes('(')){
    for(const m of s.matchAll(/\((\d{2,3})\)([^(]*)/g)){
      const ai=m[1],v=m[2].replace(/\x1D/g,'').trim();
      if(ai==='01'||ai==='02') d.gtin=v;
      if(ai==='17') d.expiry=fmtD(v);
      if(ai==='10') d.batch=v;
    }
  } else {
    let i=0;
    while(i<s.length){
      const a=s.substr(i,2);
      if(a==='01'||a==='02'){d.gtin=s.substr(i+2,14);i+=16;}
      else if(a==='17'){d.expiry=fmtD(s.substr(i+2,6));i+=8;}
      else if(['11','12','13','15','16'].includes(a)){i+=8;}
      else if(a==='10'){
        const r=s.substr(i+2),fi=r.indexOf('\x1D');
        d.batch=fi!==-1?r.slice(0,fi):r;
        i=s.length;
      } else {i++;}
    }
  }
  clog('fallback result: '+JSON.stringify(d));
  return d;
}

function fmtD(s){
  if(!s||s.length<6) return s;
  const yy=s.substr(0,2),mm=s.substr(2,2),dd=s.substr(4,2);
  return (parseInt(yy)>49?'19':'20')+yy+'-'+mm+'-'+dd;
}

/* ════ Manual Input ════ */
function handleManual(){
  const v=document.getElementById('mi').value.trim();
  if(!v){toast('請輸入 GS1 字串');return;}
  clog('手動: '+v);
  curData=parseGS1(v);
  renderSheet(v);
}

/* ════ Render Sheet ════ */
function renderSheet(raw){
  const rows=[
    {l:'GTIN（產品碼）',k:'gtin'},
    {l:'批號 Batch/Lot',k:'batch'},
    {l:'有效日期 Expiry',k:'expiry'},
  ];
  document.getElementById('rl').innerHTML=rows.map(r=>`
    <div class="rr">
      <span class="rl">${r.l}</span>
      <span class="rv ${curData[r.k]?'':'miss'}">${curData[r.k]||'— 未識別'}</span>
    </div>`).join('');
  document.getElementById('rb').textContent='原始: '+raw;
  document.getElementById('rs').classList.add('open');
}

function closeSheet(){
  document.getElementById('rs').classList.remove('open');
  setTimeout(()=>{scanning=true;},300);
}

/* ════ Send LINE ════ */
async function sendLine(){
  if(!curData) return;
  let li=false;try{li=liff.isLoggedIn();}catch(e){}
  if(!li){toast('請先登入 LINE');return;}
  const d=curData;
  const flex={type:'bubble',size:'mega',
    header:{type:'box',layout:'vertical',backgroundColor:'#06C755',paddingAll:'16px',
      contents:[{type:'text',text:'📦 GS1 掃描結果',color:'#fff',weight:'bold',size:'sm'}]},
    body:{type:'box',layout:'vertical',spacing:'md',contents:[
      mkR('GTIN（產品碼）',d.gtin||'—'),
      mkR('批號 Batch/Lot',d.batch||'—'),
      mkR('有效日期 Expiry',d.expiry||'—'),
    ]}
  };
  try{
    await liff.sendMessages([{type:'flex',altText:'GS1 掃描結果',contents:flex}]);
    clog('sendMessages OK');liff.closeWindow();
  }catch(e){cerr('sendMessages: '+e.message);toast('傳送失敗: '+e.message);}
}
function mkR(l,v){return {type:'box',layout:'vertical',spacing:'xs',contents:[{type:'text',text:l,color:'#aaa',size:'xs'},{type:'text',text:v,size:'md',weight:'bold',wrap:true}]};}

/* ════ Boot ════ */
window.addEventListener('load',async()=>{
  clog('=== GS1 Scanner v4.0 boot ===');
  clog('UA: '+navigator.userAgent.slice(0,100));
  clog('protocol: '+location.protocol);
  clog('Dynamsoft: '+(typeof Dynamsoft));
  if(typeof Dynamsoft!=='undefined'){
    clog('DBR version: '+(Dynamsoft.DBR?.engineResourcePaths||'(check manually)'));
  } else {
    cerr('Dynamsoft UNDEFINED — CDN 未載入！');
  }
  try{
    await liff.init({liffId:LIFF_ID});
    clog('liff boot OK  isLoggedIn='+liff.isLoggedIn());
    if(liff.isLoggedIn()) await enterScanner();
  }catch(e){cwarn('liff boot: '+e.message);}
});
</script>
