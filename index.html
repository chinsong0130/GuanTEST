<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GS1 產品掃描器 (LIFF 專用)</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap');

:root {
  --green: #06C755;
  --green-dark: #05A847;
  --green-dim: rgba(6,199,85,0.12);
  --black: #080808;
  --surface: #141414;
  --surface2: #1C1C1C;
  --surface3: #252525;
  --border: rgba(255,255,255,0.07);
  --text: #EFEFEF;
  --muted: #777;
  --dim: #444;
  --red: #FF4444;
  --amber: #FF9500;
  --mono: 'DM Mono', monospace;
  --sans: 'Noto Sans TC', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--black);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
}

/* ── PAGES ── */
.page { position: fixed; inset: 0; display: none; flex-direction: column; }
.page.active { display: flex; }

/* ══ AUTH PAGE ══ */
#page-auth {
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 80px;
  background: var(--black);
}
.auth-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.auth-icon {
  width: 88px; height: 88px;
  border-radius: 28px;
  background: var(--green-dim);
  border: 1px solid rgba(6,199,85,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  position: relative;
  z-index: 1;
}
.auth-content {
  width: 100%;
  max-width: 400px;
  padding: 0 28px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  z-index: 1;
}
.auth-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.25;
  text-align: center;
}
.auth-sub {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.7;
  text-align: center;
  margin-bottom: 8px;
}

/* ══ SCANNER PAGE ══ */
#page-scanner { background: #000; }
#camera-video {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}
#camera-canvas { display: none; }

.scan-ui {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  pointer-events: none;
}
.scan-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 52px 20px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
  pointer-events: all;
}
.user-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 100px;
  padding: 5px 10px 5px 5px;
  font-size: 12px;
  color: rgba(255,255,255,0.8);
}
.user-pill img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }

.viewfinder-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.vf-box {
  width: min(72vw, 280px);
  aspect-ratio: 1;
  position: relative;
  border: 2px solid rgba(255,255,255,0.3);
}
.scan-beam {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--green);
  box-shadow: 0 0 12px 3px rgba(6,199,85,0.6);
  animation: beam 2.2s infinite;
}
@keyframes beam { 0% { top: 0%; } 100% { top: 100%; } }

.scan-bottom {
  padding: 16px 20px 44px;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: all;
}

/* ══ RESULT SHEET ══ */
.result-sheet {
  position: fixed; inset: 0; z-index: 50;
  display: none; align-items: flex-end;
  background: rgba(0,0,0,0.6);
}
.result-sheet.open { display: flex; }
.result-sheet-card {
  width: 100%; background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 20px;
}
.result-row {
  display: flex; padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.rr-label { font-size: 10px; color: var(--dim); width: 60px; }
.rr-val { font-size: 14px; color: var(--text); flex: 1; }

.btn {
  width: 100%; padding: 15px; border-radius: 12px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer;
}
.btn-green { background: var(--green); color: #000; }

.loader {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center; z-index: 1000;
}
.loader.on { display: flex; }
</style>
</head>
<body>

<div class="page active" id="page-auth">
  <div class="auth-bg"><div class="auth-icon">📦</div></div>
  <div class="auth-content">
    <div class="auth-title">GS1 產品掃描器</div>
    <p class="auth-sub">請先登入 LINE 帳號以啟用掃描功能</p>
    <button class="btn btn-green" onclick="initLiff()">以 LINE 帳號登入</button>
  </div>
</div>

<div class="page" id="page-scanner">
  <video id="camera-video" autoplay playsinline muted></video>
  <canvas id="camera-canvas"></canvas>
  <div class="scan-ui">
    <div class="scan-topbar">
      <div class="user-pill">
        <img id="user-avatar" src="" alt="">
        <span id="user-name"></span>
      </div>
    </div>
    <div class="viewfinder-area">
      <div class="vf-box">
        <div class="scan-beam"></div>
      </div>
    </div>
    <div class="scan-bottom">
      <button class="btn btn-green" onclick="liffScan()">📷 使用 LINE 掃描器</button>
    </div>
  </div>
</div>

<div class="result-sheet" id="result-sheet">
  <div class="result-sheet-card">
    <h3 style="margin-bottom:15px">解析結果</h3>
    <div id="result-rows"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn btn-green" onclick="sendFlex()">📤 發送至 LINE</button>
      <button class="btn" style="background:#333; color:#fff" onclick="closeSheet()">關閉</button>
    </div>
  </div>
</div>

<div class="loader" id="loader"><div style="color:white">讀取中...</div></div>

<script>
const LIFF_ID = '2009550177-uiMwrJEn'; // 確保這是正確的 LIFF ID
let currentParsed = null;
let zxing = null;

// --- GS1 解析邏輯 (已移除序號 AI 21) ---
const GS1_AI_MAP = {
  '01':{ len:14 }, '02':{ len:14 },
  '10':{ len:-1, max:20 }, '17':{ len:6 },
};

function parseGS1(raw) {
  const r = { gtin:null, batchLot:null, expirationDate:null, raw };
  let s = raw.replace(/[\x1D\x1E\x04]/g, '|'); // 簡單處理分隔符
  
  // 處理括號格式
  if (s.startsWith('(')) {
    const re = /\((\d{2})\)([^()]*)/g;
    let m;
    while ((m = re.exec(raw)) !== null) {
      const ai = m[1], val = m[2].trim();
      if (ai === '01') r.gtin = val;
      if (ai === '10') r.batchLot = val;
      if (ai === '17') r.expirationDate = gs1Date(val);
    }
    return r;
  }

  // 處理連續字串格式 (簡化版)
  if (s.startsWith('01')) {
      r.gtin = s.substr(2, 14);
      let rest = s.substr(16);
      if (rest.startsWith('17')) {
          r.expirationDate = gs1Date(rest.substr(2,6));
          let lotPart = rest.substr(8);
          if (lotPart.startsWith('10')) r.batchLot = lotPart.substr(2);
      } else if (rest.startsWith('10')) {
          r.batchLot = rest.substr(2);
      }
  }
  return r;
}

function gs1Date(s) {
  if (!s || s.length !== 6) return s;
  const yr = 2000 + parseInt(s.slice(0,2));
  return `${yr}-${s.slice(2,4)}-${s.slice(4,6)}`;
}

// --- LIFF & 登入控制 ---
async function initLiff() {
  const loader = document.getElementById('loader');
  loader.classList.add('on');
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
    } else {
      const profile = await liff.getProfile();
      document.getElementById('user-avatar').src = profile.pictureUrl;
      document.getElementById('user-name').textContent = profile.displayName;
      
      document.getElementById('page-auth').classList.remove('active');
      document.getElementById('page-scanner').classList.add('active');
      startCamera(); // 登入後啟動相機
    }
  } catch (e) {
    alert('LIFF 初始化失敗: ' + e);
  } finally {
    loader.classList.remove('on');
  }
}

// --- 掃描功能 ---
async function startCamera() {
  const video = document.getElementById('camera-video');
  // 動態載入 ZXing 函式庫
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/@zxing/browser@0.1.5/umd/index.min.js';
  script.onload = async () => {
    zxing = new ZXingBrowser.BrowserMultiFormatReader();
    zxing.decodeFromVideoElement(video, (result) => {
      if (result && !currentParsed) {
        onDetected(result.getText());
      }
    });
  };
  document.head.appendChild(script);

  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  video.srcObject = stream;
}

async function liffScan() {
  try {
    const result = await liff.scanCodeV2();
    if (result.value) onDetected(result.value);
  } catch (e) {
    console.error(e);
  }
}

function onDetected(raw) {
  currentParsed = parseGS1(raw);
  const rows = `
    <div class="result-row"><span class="rr-label">批號</span><span class="rr-val">${currentParsed.batchLot || '無'}</span></div>
    <div class="result-row"><span class="rr-label">效期</span><span class="rr-val">${currentParsed.expirationDate || '無'}</span></div>
    <div class="result-row"><span class="rr-label">GTIN</span><span class="rr-val">${currentParsed.gtin || '無'}</span></div>
  `;
  document.getElementById('result-rows').innerHTML = rows;
  document.getElementById('result-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('result-sheet').classList.remove('open');
  currentParsed = null;
}

async function sendFlex() {
  if (!currentParsed) return;
  try {
    await liff.sendMessages([{
      type: 'flex',
      altText: 'GS1 掃描結果',
      contents: {
        type: 'bubble',
        body: {
          type: 'box', layout: 'vertical', contents: [
            { type: 'text', text: '📦 GS1 掃描結果', weight: 'bold', size: 'lg', color: '#06C755' },
            { type: 'separator', margin: 'md' },
            { type: 'text', text: `批號: ${currentParsed.batchLot || '—'}`, margin: 'md' },
            { type: 'text', text: `效期: ${currentParsed.expirationDate || '—'}` },
            { type: 'text', text: `GTIN: ${currentParsed.gtin || '—'}`, size: 'xs', color: '#888888' }
          ]
        }
      }
    }]);
    alert('已發送！');
    liff.closeWindow();
  } catch (e) {
    alert('發送失敗: ' + e);
  }
}
</script>
</body>
</html>
