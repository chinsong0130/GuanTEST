<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GS1 Scanner</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #06C755;
  --green-dim: rgba(6,199,85,0.15);
  --black: #080808;
  --surface: #111;
  --surface2: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --text: #F0F0F0;
  --muted: #666;
  --red: #FF4D4D;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; background: var(--black); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

/* ───── Pages ───── */
.page { position: fixed; inset: 0; display: none; flex-direction: column; }
.page.active { display: flex; }

/* ───── Auth Page ───── */
#page-auth {
  align-items: center; justify-content: center;
  padding: 40px 32px;
  background: var(--black);
  overflow-y: auto;
}

.auth-logo {
  width: 56px; height: 56px;
  background: var(--green);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
}
.auth-logo svg { width: 28px; height: 28px; }

.auth-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
.auth-sub { color: var(--muted); font-size: 14px; margin-bottom: 36px; }

.btn {
  width: 100%; padding: 15px 20px;
  border-radius: 12px; border: none;
  font-family: 'Syne', sans-serif;
  font-size: 15px; font-weight: 600;
  cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn:active { transform: scale(0.97); opacity: 0.85; }
.btn-primary { background: var(--green); color: #000; }
.btn-secondary { background: var(--surface2); color: var(--text); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }

.divider {
  display: flex; align-items: center; gap: 12px;
  width: 100%; max-width: 320px; margin: 24px 0;
  color: var(--muted); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.input-wrap { width: 100%; max-width: 320px; position: relative; margin-bottom: 10px; }
.input-field {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  padding: 13px 16px; border-radius: 10px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px;
  outline: none; transition: border-color 0.2s;
}
.input-field::placeholder { color: var(--muted); }
.input-field:focus { border-color: rgba(6,199,85,0.5); }

.version-tag {
  position: absolute; bottom: 20px;
  font-family: 'DM Mono', monospace; font-size: 10px; color: #2a2a2a;
}

/* ───── Scanner Page ───── */
#page-scanner { background: #000; }

#camera-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 1;
}

.scan-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  pointer-events: none; z-index: 2;
}

.scan-header {
  padding: 52px 20px 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
  pointer-events: all;
  display: flex; justify-content: space-between; align-items: center;
}

.scan-back-btn {
  background: rgba(255,255,255,0.1);
  border: none; border-radius: 10px;
  color: #fff; padding: 8px 14px;
  font-family: 'Syne', sans-serif; font-size: 13px;
  cursor: pointer; pointer-events: all;
  display: flex; align-items: center; gap: 6px;
  transition: background 0.2s;
}
.scan-back-btn:active { background: rgba(255,255,255,0.2); }

#user-display { font-size: 13px; color: rgba(255,255,255,0.7); }

.status-badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px; padding: 4px 10px;
  border-radius: 20px; border: 1px solid;
  transition: all 0.3s;
}
.status-badge.ready { color: var(--green); border-color: rgba(6,199,85,0.4); background: rgba(6,199,85,0.1); }
.status-badge.loading { color: #888; border-color: #333; background: transparent; }
.status-badge.error { color: var(--red); border-color: rgba(255,77,77,0.4); background: rgba(255,77,77,0.1); }

/* Viewfinder */
.viewfinder {
  flex: 1; display: flex; align-items: center; justify-content: center; position: relative;
}

.vf-frame {
  width: 88%; max-width: 340px; height: 150px;
  position: relative;
}

/* Corner brackets only */
.vf-frame::before, .vf-frame::after,
.vf-corner-br, .vf-corner-bl {
  content: ''; position: absolute;
  width: 22px; height: 22px;
  border-color: var(--green); border-style: solid;
  transition: border-color 0.3s;
}
.vf-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 3px 0 0 0; }
.vf-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 3px 0 0; }
.vf-corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 3px 0; }
.vf-corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 3px; }

/* Scan line */
.scan-line {
  position: absolute; width: calc(100% - 4px); left: 2px; height: 2px;
  background: linear-gradient(to right, transparent, var(--green), transparent);
  box-shadow: 0 0 8px var(--green);
  animation: sweep 2s ease-in-out infinite;
  display: none;
}
.scanning .scan-line { display: block; }

@keyframes sweep {
  0%   { top: 0; opacity: 1; }
  90%  { top: calc(100% - 2px); opacity: 1; }
  100% { top: calc(100% - 2px); opacity: 0; }
}

/* Idle state */
.scan-idle-msg {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; color: rgba(255,255,255,0.4);
  font-size: 13px; text-align: center;
  line-height: 1.5;
}
.scan-idle-msg svg { opacity: 0.3; margin-bottom: 4px; }

.scan-footer {
  padding: 20px 20px 44px;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
  pointer-events: all; display: flex; flex-direction: column; gap: 10px;
}

/* ───── Result Sheet ───── */
.sheet {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
  display: none; align-items: flex-end; z-index: 100;
  animation: fadeIn 0.2s ease;
}
.sheet.open { display: flex; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.sheet-content {
  width: 100%; background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 28px 24px 40px;
  max-height: 82vh; overflow-y: auto;
  animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.sheet-handle {
  width: 36px; height: 4px;
  background: #333; border-radius: 2px;
  margin: 0 auto 24px;
}

.sheet-title {
  font-size: 18px; font-weight: 700;
  margin-bottom: 20px; letter-spacing: -0.3px;
}

.result-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden; margin-bottom: 12px;
}

.result-row {
  display: flex; flex-direction: column;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.result-row:last-child { border-bottom: none; }

.result-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
.result-value {
  font-family: 'DM Mono', monospace;
  font-size: 16px; font-weight: 500;
  color: var(--green); word-break: break-all; line-height: 1.4;
}
.result-value.missing { color: var(--muted); font-style: italic; font-size: 14px; }

.raw-debug {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: #333; word-break: break-all;
  margin: 12px 0; padding: 12px;
  background: #0d0d0d; border-radius: 8px; line-height: 1.6;
}

.sheet-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

/* ───── Toast ───── */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: #1e1e1e; border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 10px 18px;
  border-radius: 20px; z-index: 200; white-space: nowrap;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
  font-family: 'DM Mono', monospace;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ─── ZXing CDN (分離的 @zxing/library + @zxing/browser) ─── -->
<script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
<script src="https://unpkg.com/@zxing/browser@0.1.5/umd/index.min.js"></script>

<script>
const LIFF_ID = '2009550177-uiMwrJEn';

let currentData = null;
let stream = null;
let scanControls = null;   // decodeFromConstraints 返回的 controls
let isScanning = false;

// ──────────────── Toast ────────────────
function toast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ──────────────── LIFF ────────────────
async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
    } else {
      await enterScannerPage();
    }
  } catch (err) {
    toast('LIFF 初始化失敗: ' + err.message);
  }
}

async function enterScannerPage() {
  const profile = await liff.getProfile().catch(() => null);
  if (profile) {
    document.getElementById('user-display').textContent = profile.displayName;
  }
  document.getElementById('page-auth').classList.remove('active');
  document.getElementById('page-scanner').classList.add('active');
}

// ──────────────── Camera ────────────────
async function startCamera() {
  const statusEl = document.getElementById('status-badge');
  const idleMsg  = document.getElementById('idle-msg');
  const startBtn = document.getElementById('start-cam-btn');
  const stopBtn  = document.getElementById('stop-cam-btn');

  setStatus('loading', '啟動中...');

  try {
    // 先取得 stream（讓 LIFF WebView 觸發權限彈窗）
    if (stream) stopStream();

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });

    const video = document.getElementById('camera-video');
    video.srcObject = stream;
    await video.play();

    setStatus('ready', '對準條碼');
    idleMsg.style.display = 'none';
    document.getElementById('vf-frame').classList.add('scanning');
    startBtn.style.display = 'none';
    stopBtn.style.display  = 'block';
    isScanning = true;

    initDecoder(video);

  } catch (err) {
    console.error('Camera error:', err);
    let msg = '相機啟動失敗';
    if (err.name === 'NotAllowedError')  msg = '請允許相機權限';
    if (err.name === 'NotFoundError')    msg = '找不到相機裝置';
    if (err.name === 'NotReadableError') msg = '相機被其他 App 佔用';
    setStatus('error', msg);
    toast(msg);
  }
}

function stopCamera() {
  stopStream();
  if (scanControls) { try { scanControls.stop(); } catch(e){} scanControls = null; }
  isScanning = false;
  document.getElementById('vf-frame').classList.remove('scanning');
  document.getElementById('idle-msg').style.display = 'flex';
  document.getElementById('start-cam-btn').style.display = 'block';
  document.getElementById('stop-cam-btn').style.display  = 'none';
  setStatus('loading', '已停止');
}

function stopStream() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('camera-video');
  video.srcObject = null;
}

// ──────────────── ZXing Decoder ────────────────
async function initDecoder(videoEl) {
  const statusEl = document.getElementById('status-badge');

  // 確認套件已載入
  if (typeof ZXingBrowser === 'undefined' || typeof ZXing === 'undefined') {
    setStatus('error', '解碼庫未載入');
    toast('解碼庫載入失敗，請重新整理頁面');
    return;
  }

  const hints = new Map();
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  hints.set(ZXing.DecodeHintType.ASSUME_GS1, true);
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.DATA_MATRIX,
    ZXing.BarcodeFormat.QR_CODE,
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
  ]);

  const codeReader = new ZXingBrowser.BrowserMultiFormatReader(hints);

  const constraints = {
    video: {
      facingMode: 'environment',
      width:  { ideal: 1920 },
      height: { ideal: 1080 },
    }
  };

  try {
    // decodeFromConstraints: 正確的新版 API
    // 注意：此 API 會自己管理 stream，不使用我們已建立的 stream
    // 所以先停掉我們自己的 stream
    stopStream();

    scanControls = await codeReader.decodeFromConstraints(
      constraints,
      videoEl,
      (result, error) => {
        if (result && isScanning) {
          if (navigator.vibrate) navigator.vibrate(80);
          handleDetection(result.getText());
        }
        // error 是 NotFoundException，每幀都會丟，不處理
      }
    );

    setStatus('ready', '對準條碼');

  } catch (err) {
    console.error('Decoder error:', err);
    setStatus('error', '解碼器啟動失敗');
    toast('解碼器啟動失敗: ' + err.message);
  }
}

function setStatus(type, text) {
  const el = document.getElementById('status-badge');
  el.className = 'status-badge ' + type;
  el.textContent = text;
}

// ──────────────── GS1 Parse ────────────────
function parseGS1(raw) {
  const data = { gtin: null, batch: null, expiry: null };

  // 去掉 AIM 識別碼前綴（如 ]C1, ]d2 等）
  let clean = raw.trim().replace(/^\](C1|d2|e0|Q3)/,'');

  // ── 括號格式 (01)xxx(17)xxx(10)xxx ──
  if (clean.includes('(')) {
    for (const m of clean.matchAll(/\((\d{2,3})\)([^(]*)/g)) {
      const ai = m[1], val = m[2].replace(/\x1D/g,'').trim();
      if (ai === '01' || ai === '02') data.gtin   = val;
      if (ai === '17')                data.expiry  = formatGS1Date(val);
      if (ai === '10')                data.batch   = val;
    }
    return data;
  }

  // ── 原始連續格式，用狀態機解析 ──
  let i = 0;
  while (i < clean.length) {
    const ai2 = clean.substr(i, 2);
    const ai3 = clean.substr(i, 3);

    if (ai2 === '01' || ai2 === '02') {
      data.gtin = clean.substr(i + 2, 14);
      i += 16;
    } else if (ai2 === '17') {
      data.expiry = formatGS1Date(clean.substr(i + 2, 6));
      i += 8;
    } else if (ai2 === '11' || ai2 === '12' || ai2 === '13' || ai2 === '15' || ai2 === '16') {
      i += 8; // 日期型固定長度 6 + AI 2
    } else if (ai2 === '10') {
      // AI 10 = 批號，可變長度，以 FNC1(\x1D) 或字串結束為準
      const rest = clean.substr(i + 2);
      const fnc1 = rest.indexOf('\x1D');
      data.batch = fnc1 !== -1 ? rest.substring(0, fnc1) : rest;
      i = clean.length; // 批號通常在最後
    } else if (ai2 === '21') {
      const rest = clean.substr(i + 2);
      const fnc1 = rest.indexOf('\x1D');
      const val = fnc1 !== -1 ? rest.substring(0, fnc1) : rest;
      i += 2 + (fnc1 !== -1 ? fnc1 + 1 : val.length);
    } else {
      i++;
    }
  }
  return data;
}

function formatGS1Date(s) {
  if (!s || s.length < 6) return s;
  const yy = s.substr(0,2), mm = s.substr(2,2), dd = s.substr(4,2);
  const year = parseInt(yy) > 49 ? '19' + yy : '20' + yy;
  return `${year}-${mm}-${dd}`;
}

// ──────────────── Detection & UI ────────────────
function handleDetection(raw) {
  if (!isScanning) return;
  isScanning = false; // 避免重複觸發

  currentData = parseGS1(raw);

  const vals = [
    { label: 'GTIN（產品碼）', key: 'gtin' },
    { label: '批號 Batch/Lot', key: 'batch' },
    { label: '有效日期 Expiry', key: 'expiry' },
  ];

  document.getElementById('result-list').innerHTML = vals.map(v => `
    <div class="result-row">
      <span class="result-label">${v.label}</span>
      <span class="result-value ${currentData[v.key] ? '' : 'missing'}">
        ${currentData[v.key] || '— 未識別'}
      </span>
    </div>
  `).join('');

  document.getElementById('raw-debug').textContent = '原始內容: ' + raw;
  document.getElementById('result-sheet').classList.add('open');
}

function closeResult() {
  document.getElementById('result-sheet').classList.remove('open');
  setTimeout(() => { isScanning = true; }, 300);
}

// ──────────────── Manual Input ────────────────
function handleManualInput() {
  const val = document.getElementById('manual-gs1-input').value.trim();
  if (!val) { toast('請輸入 GS1 字串'); return; }

  // 從 Auth 頁面直接顯示結果（不需進入 Scanner 頁）
  handleDetectionFromAuth(val);
}

function handleDetectionFromAuth(raw) {
  currentData = parseGS1(raw);
  const vals = [
    { label: 'GTIN（產品碼）', key: 'gtin' },
    { label: '批號 Batch/Lot', key: 'batch' },
    { label: '有效日期 Expiry', key: 'expiry' },
  ];
  document.getElementById('result-list').innerHTML = vals.map(v => `
    <div class="result-row">
      <span class="result-label">${v.label}</span>
      <span class="result-value ${currentData[v.key] ? '' : 'missing'}">
        ${currentData[v.key] || '— 未識別'}
      </span>
    </div>
  `).join('');
  document.getElementById('raw-debug').textContent = '原始內容: ' + raw;
  document.getElementById('result-sheet').classList.add('open');
}

// ──────────────── Navigation ────────────────
function backToHome() {
  stopCamera();
  document.getElementById('page-scanner').classList.remove('active');
  document.getElementById('page-auth').classList.add('active');
  document.getElementById('user-display').textContent = '';
}

// ──────────────── Send to LINE ────────────────
async function sendToLine() {
  if (!currentData) return;

  // 若尚未登入 LINE，提示
  let isLoggedIn = false;
  try { isLoggedIn = liff.isLoggedIn(); } catch(e) {}
  if (!isLoggedIn) { toast('請先登入 LINE 帳號'); return; }

  const d = currentData;
  const flex = {
    type: 'bubble', size: 'mega',
    header: {
      type: 'box', layout: 'vertical',
      backgroundColor: '#06C755', paddingAll: '16px',
      contents: [{
        type: 'text', text: '📦 GS1 掃描結果',
        color: '#ffffff', weight: 'bold', size: 'sm'
      }]
    },
    body: {
      type: 'box', layout: 'vertical', spacing: 'md',
      contents: [
        makeFlexRow('GTIN（產品碼）', d.gtin   || '—'),
        makeFlexRow('批號 Batch/Lot', d.batch   || '—'),
        makeFlexRow('有效日期 Expiry', d.expiry  || '—'),
      ]
    }
  };

  try {
    await liff.sendMessages([{ type: 'flex', altText: 'GS1 掃描結果', contents: flex }]);
    liff.closeWindow();
  } catch (err) {
    toast('傳送失敗: ' + err.message);
  }
}

function makeFlexRow(label, value) {
  return {
    type: 'box', layout: 'vertical', spacing: 'xs',
    contents: [
      { type: 'text', text: label, color: '#aaaaaa', size: 'xs' },
      { type: 'text', text: value, size: 'md', weight: 'bold', wrap: true }
    ]
  };
}

// ──────────────── Auto-login on load ────────────────
window.addEventListener('load', async () => {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      await enterScannerPage();
    }
  } catch (e) {
    // 靜默失敗，讓用戶手動按登入
  }
});
</script>
