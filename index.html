<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GS1 產品掃描器 (LIFF)</title>
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap');

:root {
  --green: #06C755;
  --black: #080808;
  --surface: #141414;
  --border: rgba(255,255,255,0.1);
  --text: #EFEFEF;
  --muted: #777;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  height: 100%;
  background: var(--black);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  overflow: hidden;
}

.page { position: fixed; inset: 0; display: none; flex-direction: column; }
.page.active { display: flex; }

/* Auth Page */
#page-auth { align-items: center; justify-content: center; padding: 40px; text-align: center; }

/* Scanner Page */
#page-scanner { background: #000; }
#camera-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

.scan-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  pointer-events: none;
}

.scan-header {
  padding: 50px 20px 20px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
  pointer-events: all;
}

.viewfinder {
  flex: 1; display: flex; align-items: center; justify-content: center;
}

/* 調整取景框比例，更適合長條形 Barcode */
.vf-box {
  width: 80%;
  height: 200px;
  border: 2px solid var(--green);
  position: relative;
  box-shadow: 0 0 0 5000px rgba(0,0,0,0.5);
  transition: all 0.3s;
}

.scan-line {
  position: absolute; width: 100%; height: 2px;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
  animation: scan 2s linear infinite;
}

@keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

.scan-footer {
  padding: 20px 20px 40px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  pointer-events: all;
}

/* Result Sheet */
.sheet {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: none; align-items: flex-end; z-index: 100;
}
.sheet.open { display: flex; }
.sheet-content {
  width: 100%; background: var(--surface);
  border-radius: 20px 20px 0 0; padding: 25px;
  max-height: 80vh; overflow-y: auto;
}

.data-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
.data-label { color: var(--muted); font-size: 14px; }
.data-value { font-family: 'DM Mono', monospace; color: var(--green); font-weight: 500; }

.btn {
  width: 100%; padding: 16px; border-radius: 12px; border: none;
  font-size: 16px; font-weight: bold; cursor: pointer;
}
.btn-primary { background: var(--green); color: #000; }
.btn-secondary { background: #333; color: #fff; margin-top: 10px; }

.debug-info {
    font-size: 10px; color: #555; word-break: break-all; margin-top: 10px; font-family: monospace;
}
</style>
</head>
<body>

<div class="page active" id="page-auth">
  <h1 style="margin-bottom: 10px;">GS1 Scanner</h1>
  <p style="color: var(--muted); margin-bottom: 30px;">需登入 LINE 帳號後開始掃描</p>
  <button class="btn btn-primary" onclick="initLiff()">以 LINE 帳號登入</button>
</div>

<div class="page" id="page-scanner">
  <video id="camera-video" playsinline></video>
  <div class="scan-overlay">
    <div class="scan-header">
        <div id="user-info" style="font-size: 14px;">載入中...</div>
    </div>
    <div class="viewfinder">
      <div class="vf-box" id="vf-box"><div class="scan-line"></div></div>
    </div>
    <div class="scan-footer">
      <button class="btn btn-primary" onclick="liffScan()">使用 LINE 原生掃描器</button>
      <p style="text-align:center; font-size: 12px; color: #888; margin-top: 15px;">支援 GS1-128, DataMatrix, QR</p>
    </div>
  </div>
</div>

<div class="sheet" id="result-sheet">
  <div class="sheet-content">
    <h2 style="margin-bottom: 20px;">掃描結果</h2>
    <div id="result-list"></div>
    <div class="debug-info" id="raw-data-debug"></div>
    <div style="margin-top: 30px;">
      <button class="btn btn-primary" onclick="sendToLine()">發送至聊天室</button>
      <button class="btn btn-secondary" onclick="closeResult()">繼續掃描</button>
    </div>
  </div>
</div>

<script>
const LIFF_ID = '2009550177-uiMwrJEn'; 
let currentData = null;
let codeReader = null;
let isScanning = true;
let videoTrack = null;

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
    } else {
      const profile = await liff.getProfile();
      document.getElementById('user-info').innerText = `使用者: ${profile.displayName}`;
      document.getElementById('page-auth').classList.remove('active');
      document.getElementById('page-scanner').classList.add('active');
      startCamera();
    }
  } catch (err) {
    console.error('LIFF Init Error:', err);
  }
}

async function startCamera() {
  const video = document.getElementById('camera-video');
  
  if (!window.ZXingBrowser) {
    await new Promise(r => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/@zxing/browser@0.1.5/umd/index.min.js';
      s.onload = r;
      document.head.appendChild(s);
    });
  }

  // 設定高品質相機參數與解碼格式
  const hints = new Map();
  // TRY_HARDER = 2, ASSUME_GS1 = 9
  hints.set(2, true); 
  
  codeReader = new ZXingBrowser.BrowserMultiFormatReader(hints);
  
  const constraints = {
    video: {
      facingMode: "environment",
      width: { ideal: 1920 },
      height: { ideal: 1080 },
      focusMode: "continuous"
    }
  };

  try {
    // 使用 decodeFromConstraints 獲得更好的控制
    codeReader.decodeFromConstraints(constraints, video, (result, error) => {
      if (result && isScanning) {
        handleDetection(result.getText());
      }
    });
  } catch (err) {
    console.error('Camera Access Error:', err);
    alert('無法啟動相機，請檢查權限設定。');
  }
}

async function liffScan() {
  try {
    const result = await liff.scanCodeV2();
    if (result.value) handleDetection(result.value);
  } catch (err) {
    console.error('LIFF Scan Error:', err);
  }
}

function parseGS1(raw) {
    const data = { gtin: null, batch: null, expiry: null };
    let clean = raw.trim();
    
    // 移除常見的傳輸識別碼 (AIM Identifiers)
    // ]C1 = GS1-128, ]d2 = GS1 DataMatrix
    clean = clean.replace(/^\](C1|d2|e0|Q3)/, "");

    if (clean.includes('(')) {
        // 處理括號格式 (01)0471...
        const matches = clean.matchAll(/\((\d{2,3})\)([^()]+)/g);
        for (const match of matches) {
            const ai = match[1];
            const val = match[2];
            if (ai === '01' || ai === '02') data.gtin = val;
            if (ai === '10') data.batch = val;
            if (ai === '17') data.expiry = formatGS1Date(val);
        }
    } else {
        // 處理連續字串格式
        // GS1 規範：01 開頭固定 14 位，17 固定 6 位
        if (clean.startsWith('01')) {
            data.gtin = clean.substr(2, 14);
            let rest = clean.substr(16);
            
            // 嘗試尋找 17 (效期)
            if (rest.startsWith('17')) {
                data.expiry = formatGS1Date(rest.substr(2, 6));
                let afterExpiry = rest.substr(8);
                if (afterExpiry.startsWith('10')) data.batch = afterExpiry.substr(2);
            } else if (rest.startsWith('10')) {
                // 如果 16 位後直接是 10 (批號)
                data.batch = rest.substr(2);
            }
        }
    }
    return data;
}

function formatGS1Date(s) {
    if (!s || s.length < 6) return s;
    const y = "20" + s.substr(0, 2);
    const m = s.substr(2, 2);
    const d = s.substr(4, 2);
    return `${y}-${m}-${d}`;
}

function handleDetection(raw) {
  isScanning = false;
  currentData = parseGS1(raw);
  
  const list = document.getElementById('result-list');
  list.innerHTML = `
    <div class="data-row"><span class="data-label">GTIN (產品碼)</span><span class="data-value">${currentData.gtin || '未辨識'}</span></div>
    <div class="data-row"><span class="data-label">批號 (Batch)</span><span class="data-value">${currentData.batch || '未辨識'}</span></div>
    <div class="data-row"><span class="data-label">有效日期</span><span class="data-value">${currentData.expiry || '未辨識'}</span></div>
  `;
  
  document.getElementById('raw-data-debug').innerText = `Raw: ${raw}`;
  document.getElementById('result-sheet').classList.add('open');
  
  if (navigator.vibrate) navigator.vibrate(100);
}

function closeResult() {
  document.getElementById('result-sheet').classList.remove('open');
  setTimeout(() => { isScanning = true; }, 500);
}

async function sendToLine() {
  if (!currentData) return;
  
  const flex = {
    type: "bubble",
    size: "kilo",
    header: { type: "box", layout: "vertical", backgroundColor: "#06C755", contents: [{ type: "text", text: "📦 GS1 掃描結果", color: "#ffffff", weight: "bold", size: "sm" }] },
    body: {
      type: "box", layout: "vertical", spacing: "md", contents: [
        { type: "box", layout: "horizontal", contents: [{ type: "text", text: "GTIN", color: "#aaaaaa", size: "sm" }, { type: "text", text: currentData.gtin || "—", align: "end", size: "sm", weight: "bold" }] },
        { type: "box", layout: "horizontal", contents: [{ type: "text", text: "批號", color: "#aaaaaa", size: "sm" }, { type: "text", text: currentData.batch || "—", align: "end", size: "sm", weight: "bold" }] },
        { type: "box", layout: "horizontal", contents: [{ type: "text", text: "效期", color: "#aaaaaa", size: "sm" }, { type: "text", text: currentData.expiry || "—", align: "end", size: "sm", weight: "bold" }] }
      ]
    }
  };

  try {
    await liff.sendMessages([{ type: "flex", altText: "GS1 掃描結果", contents: flex }]);
    liff.closeWindow();
  } catch (err) {
    alert("發送失敗: " + err);
  }
}
</script>
</body>
</html>
